// Classify a meeting's flexibility based on keyword + attendee rules + group size
function classifyFlex(title, rules, defaultTier = "sometimes", attendees = [], largeGroupThresh = 5) {
  const lowerTitle = title.toLowerCase();
  const lowerAttendees = attendees.map(a => a.toLowerCase());

  // Large group meetings are hard to reschedule
  if (attendees.length >= largeGroupThresh) return "never";
  for (const rule of rules) {
    if (rule.type === "keyword" && rule.values.some(kw => lowerTitle.includes(kw.toLowerCase()))) {
      return rule.tier;
    }
    if (rule.type === "attendee" && rule.values.some(name => lowerAttendees.some(a => a.includes(name.toLowerCase())))) {
      return rule.tier;
    }
  }
  return defaultTier;
}

// ── UTILITIES ──
const timeToMin = t => {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
};
const minToTime = m => {
  const h = Math.floor(m / 60);
  const mi = m % 60;
  return `${h}:${mi.toString().padStart(2, "0")}`;
};
const formatTime = t => {
  const [h, m] = t.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  const hh = h % 12 || 12;
  return `${hh}:${m.toString().padStart(2, "0")} ${ampm}`;
};
const formatDuration = (start, end) => {
  const diff = (timeToMin(end) - timeToMin(start)) / 60;
  return diff === 1 ? "1 hr" : diff < 1 ? `${Math.round(diff * 60)} min` : `${diff} hrs`;
};
const getDayName = dateStr => {
  const d = new Date(dateStr + "T12:00:00");
  return ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][d.getDay()];
};
const getFullDay = dateStr => {
  const d = new Date(dateStr + "T12:00:00");
  return ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][d.getDay()];
};
const formatDate = dateStr => {
  const d = new Date(dateStr + "T12:00:00");
  const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  return `${months[d.getMonth()]} ${d.getDate()}`;
};
const getEventsByDate = events => {
  const grouped = {};
  events.forEach(e => {
    if (!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e);
  });
  Object.values(grouped).forEach(arr => arr.sort((a, b) => timeToMin(a.startTime) - timeToMin(b.startTime)));
  return grouped;
};

// ── ANALYTICS ENGINE ──
function analyzeSchedule(events) {
  const byDate = getEventsByDate(events);
  const days = Object.keys(byDate).sort();
  const alerts = [];
  const dailyHealth = [];
  days.forEach(date => {
    const dayEvents = byDate[date];
    let score = 100;
    const dayAlerts = [];
    const dayName = getDayName(date);
    const isWeekday = !["Sat", "Sun"].includes(dayName);
    if (!isWeekday) return;

    // Tight transitions (<15 min between meetings)
    for (let i = 0; i < dayEvents.length - 1; i++) {
      const gap = timeToMin(dayEvents[i + 1].startTime) - timeToMin(dayEvents[i].endTime);
      if (gap >= 0 && gap < 15 && dayEvents[i].type !== "dns" && dayEvents[i + 1].type !== "dns") {
        const severity = gap === 0 ? "critical" : "warning";
        dayAlerts.push({
          type: "tight_transition",
          severity,
          message: `${gap === 0 ? "Back-to-back" : `${gap} min gap`}: ${dayEvents[i].title} ends ${formatTime(dayEvents[i].endTime)}, ${dayEvents[i + 1].title} starts ${formatTime(dayEvents[i + 1].startTime)}`,
          date
        });
        score -= gap === 0 ? 15 : 8;
      }
    }

    // Back-to-back chain (3+ consecutive with <15 min gaps)
    let chain = 1;
    for (let i = 0; i < dayEvents.length - 1; i++) {
      const gap = timeToMin(dayEvents[i + 1].startTime) - timeToMin(dayEvents[i].endTime);
      if (gap < 15 && gap >= 0) {
        chain++;
      } else {
        chain = 1;
      }
      if (chain >= 3) {
        dayAlerts.push({
          type: "chain",
          severity: "critical",
          message: `${chain} meetings back-to-back without a real break`,
          date
        });
        score -= 10;
      }
    }

    // No lunch break (something between 11:30-13:30 with no 30+ min gap)
    const lunchStart = timeToMin("11:30");
    const lunchEnd = timeToMin("13:30");
    const lunchEvents = dayEvents.filter(e => {
      const s = timeToMin(e.startTime);
      const en = timeToMin(e.endTime);
      return s < lunchEnd && en > lunchStart;
    });
    if (lunchEvents.length >= 2) {
      let hasLunchGap = false;
      for (let i = 0; i < lunchEvents.length - 1; i++) {
        const gap = timeToMin(lunchEvents[i + 1].startTime) - timeToMin(lunchEvents[i].endTime);
        if (gap >= 30) hasLunchGap = true;
      }
      if (!hasLunchGap) {
        dayAlerts.push({
          type: "no_lunch",
          severity: "warning",
          message: "No 30+ min lunch break between 11:30 AM and 1:30 PM",
          date
        });
        score -= 10;
      }
    }

    // Overloaded day (>6 hrs of meetings)
    const totalMin = dayEvents.reduce((sum, e) => sum + (timeToMin(e.endTime) - timeToMin(e.startTime)), 0);
    if (totalMin > 360) {
      dayAlerts.push({
        type: "overloaded",
        severity: "warning",
        message: `${(totalMin / 60).toFixed(1)} hours of meetings. Heavy day.`,
        date
      });
      score -= 10;
    }

    // Early morning meeting (before 9 AM, not personal)
    const earlyMeetings = dayEvents.filter(e => timeToMin(e.startTime) < timeToMin("09:00") && e.type !== "personal");
    if (earlyMeetings.length) {
      dayAlerts.push({
        type: "early",
        severity: "info",
        message: `Meeting before 9 AM: ${earlyMeetings[0].title}`,
        date
      });
      score -= 5;
    }

    // Late meeting (after 6 PM, not personal)
    const lateMeetings = dayEvents.filter(e => timeToMin(e.endTime) > timeToMin("18:00") && e.type !== "personal");
    if (lateMeetings.length) {
      dayAlerts.push({
        type: "late",
        severity: "info",
        message: `Meeting runs past 6 PM: ${lateMeetings[0].title}`,
        date
      });
      score -= 5;
    }
    alerts.push(...dayAlerts);
    dailyHealth.push({
      date,
      day: dayName,
      label: `${dayName} ${formatDate(date)}`,
      score: Math.max(0, Math.min(100, score)),
      meetings: dayEvents.length,
      hours: +(totalMin / 60).toFixed(1),
      alerts: dayAlerts.length,
      critical: dayAlerts.filter(a => a.severity === "critical").length
    });
  });
  return {
    alerts,
    dailyHealth,
    byDate
  };
}

// ── AVAILABILITY FINDER (multi-calendar) ──
function findMultiAvailability(calendarMap, selectedPeople, dates, startHour = "08:30", endHour = "18:00", minSlot = 30, lunchStartStr = "13:00", lunchEndStr = "14:30", noMorningBefore = "", fridayAfternoonOff = false, flexRules = DEFAULT_FLEX_RULES, defaultFlexTier = "sometimes", largeGroupThresh = 5) {
  const availability = [];
  dates.forEach(date => {
    const dayName = getDayName(date);
    if (["Sat", "Sun"].includes(dayName)) return;
    let dayStart = timeToMin(startHour);
    let dayEnd = timeToMin(endHour);
    const lunchStart = timeToMin(lunchStartStr);
    const lunchEnd = timeToMin(lunchEndStr);
    if (noMorningBefore && timeToMin(noMorningBefore) > dayStart) {
      dayStart = timeToMin(noMorningBefore);
    }
    if (fridayAfternoonOff && dayName === "Fri") {
      dayEnd = Math.min(dayEnd, timeToMin("13:00"));
    }

    // Collect events with flexibility classification
    const hardBlocks = []; // never-move events (+ lunch)
    const softBlocks = []; // sometimes/often move events with their tier and metadata
    const perPersonConflicts = {};
    const allHolds = [];
    selectedPeople.forEach(person => {
      const events = calendarMap[person] || [];
      const evtByDate = getEventsByDate(events);
      const dayEvents = evtByDate[date] || [];
      perPersonConflicts[person] = dayEvents;
      dayEvents.forEach(e => {
        if (e.type === "hold") {
          allHolds.push({
            ...e,
            person
          });
          return;
        }
        const flex = e.type === "dns" ? "never" : classifyFlex(e.title, flexRules, defaultFlexTier, e.attendees || [], largeGroupThresh);
        const block = {
          start: timeToMin(e.startTime),
          end: timeToMin(e.endTime),
          person,
          title: e.title,
          flex,
          type: e.type
        };
        if (flex === "never") {
          hardBlocks.push(block);
        } else {
          softBlocks.push(block);
        }
      });
    });

    // Add lunch as a hard block
    hardBlocks.push({
      start: lunchStart,
      end: lunchEnd,
      person: "_system",
      title: "Lunch",
      flex: "never",
      type: "system"
    });
    hardBlocks.sort((a, b) => a.start - b.start);

    // Merge hard blocks
    const mergedHard = [];
    hardBlocks.forEach(b => {
      if (mergedHard.length && b.start <= mergedHard[mergedHard.length - 1].end) {
        mergedHard[mergedHard.length - 1].end = Math.max(mergedHard[mergedHard.length - 1].end, b.end);
      } else {
        mergedHard.push({
          start: b.start,
          end: b.end
        });
      }
    });

    // Find windows not blocked by hard blocks
    const rawWindows = [];
    let cursor = dayStart;
    mergedHard.forEach(b => {
      if (b.start > cursor && b.start - cursor >= minSlot) {
